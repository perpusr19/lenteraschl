<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Perpustakaan Modern</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-body: #F4F7FE;
            --white: #FFFFFF;
            --text-dark: #2B3674;
            --text-light: #A3AED0;
            --primary: #4318FF;
            --hover-color: #F4F7FE;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Header Area */
        .top-header {
            width: 100%;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .top-header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: -0.5px;
        }

        .top-header p {
            color: var(--text-light);
            font-size: 1rem;
            font-weight: 400;
            margin-top: 5px;
        }

        /* Container Menu Grid */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            width: 90%;
            max-width: 1100px;
            padding: 0 20px 40px 20px;
        }

        /* Desain Card Modern */
        .card {
            background: var(--white);
            border-radius: 20px;
            padding: 35px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0px 18px 40px rgba(112, 144, 176, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.5);
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0px 25px 50px rgba(112, 144, 176, 0.2);
            background-color: var(--white);
        }

        .icon-wrapper {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background-color: var(--hover-color);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            color: var(--primary);
            font-size: 1.8rem;
            transition: all 0.3s ease;
        }

        .card:hover .icon-wrapper {
            background-color: var(--primary);
            color: var(--white);
        }

        .card h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        /* Floating Admin Button */
        .admin-wrapper {
            margin-top: auto;
            padding-bottom: 40px;
        }

        .btn-admin {
            background-color: var(--white);
            color: var(--text-dark);
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            box-shadow: 0px 10px 20px rgba(112, 144, 176, 0.15);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-admin i {
            color: var(--primary);
        }

        .btn-admin:hover {
            box-shadow: 0px 15px 25px rgba(112, 144, 176, 0.25);
            transform: translateY(-3px);
        }

        /* Responsiveness */
        @media (max-width: 768px) {
            .top-header h1 { font-size: 1.8rem; }
            .grid-container { gap: 16px; }
            .card { padding: 25px 15px; }
        }
    </style>
</head>
<body>

    <div class="top-header">
        <h1>Sistem Perpustakaan</h1>
        <p>Akses layanan perpustakaan secara digital dengan mudah dan cepat.</p>
    </div>

    <div class="grid-container">
        
        <div class="card">
            <div class="icon-wrapper">
                <i class="fa-solid fa-book"></i>
            </div>
            <h3>Daftar Buku</h3>
        </div>

        <div class="card">
            <div class="icon-wrapper">
                <i class="fa-solid fa-hand-holding-hand"></i>
            </div>
            <h3>Peminjaman</h3>
        </div>

        <div class="card">
            <div class="icon-wrapper">
                <i class="fa-solid fa-right-left"></i>
            </div>
            <h3>Pengembalian</h3>
        </div>

        <div class="card">
            <div class="icon-wrapper">
                <i class="fa-solid fa-id-card-clip"></i>
            </div>
            <h3>Absen Anggota</h3>
        </div>

        <div class="card">
            <div class="icon-wrapper">
                <i class="fa-solid fa-users"></i>
            </div>
            <h3>Data Anggota</h3>
        </div>

    </div>

    <div class="admin-wrapper">
        <button class="btn-admin">
            <i class="fa-solid fa-shield-halved"></i>
            Akses Admin
        </button>
    </div>

</body>
</html>
